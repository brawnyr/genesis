<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="logo">
                <div class="logo-text"><span>G</span><span>O</span><span>D</span></div>
                <span class="logo-sub">genesis on disk</span>
            </div>
        </header>

        <section class="transport-text" id="transport">
            <!-- Rendered by JS as text items -->
        </section>

        <section class="loop-section">
            <div class="loop-bar-container">
                <div class="loop-bar" id="loop-bar"></div>
                <div class="loop-beat-markers" id="beat-markers"></div>
            </div>
            <div class="loop-info">
                <span class="bar-indicator" id="bar-indicator">bar 1/1</span>
                <span class="pass-counter" id="pass-counter"></span>
            </div>
        </section>

        <section class="patterns-section">
            <div class="patterns-header">
                <span class="section-title">patterns</span>
            </div>
            <div class="patterns-list" id="patterns-list">
                <div class="empty-state">press space to begin</div>
            </div>
        </section>

        <footer class="footer">
            <div class="shortcuts">
                <kbd>space</kbd> play
                <kbd>g</kbd> god
                <kbd>u</kbd> undo
                <kbd>r</kbd> redo
                <kbd>m</kbd> metro
                <kbd>↑↓</kbd> bpm
                <kbd>1 2 4</kbd> bars
            </div>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
